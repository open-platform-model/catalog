name: Publish Catalog Modules

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      module:
        description: 'Module to publish'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - core
          - opm
          - gateway_api
          - cert_manager
          - k8up
          - kubernetes
      dry_run:
        description: 'Validate only, skip publish'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

env:
  CUE_VERSION: 'v0.16.0'
  CUE_REGISTRY: 'opmodel.dev=ghcr.io/open-platform-model,registry.cue.works'

jobs:
  publish:
    name: Validate and Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        uses: mikefarah/yq@master
        with:
          cmd: echo "yq installed"

      - name: Check registry for unpublished versions
        id: check
        run: |
          set -euo pipefail

          # workflow_dispatch bypasses registry check — user controls via inputs
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "changed=all" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          version_published() {
            local repo="$1" tag="$2"
            curl -fsS --head \
              -u "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.oci.image.manifest.v1+json,*/*" \
              "https://ghcr.io/v2/open-platform-model/${repo}/manifests/${tag}" \
              >/dev/null 2>&1
          }

          MODULES="core:v1alpha1 opm:v1alpha1 gateway_api:v1alpha1 cert_manager:v1alpha1 k8up:v1alpha1 kubernetes:v1"
          CHANGED=""

          for entry in $MODULES; do
            key="${entry%%:*}"
            api_ver="${entry##*:}"
            version=$(yq ".${key}.${api_ver}.version" versions.yml)
            oci_repo="opmodel.dev/${key}/${api_ver}"

            if version_published "$oci_repo" "$version"; then
              echo "  ${key}/${api_ver}@${version}: already published"
            else
              echo "  ${key}/${api_ver}@${version}: unpublished"
              CHANGED="${CHANGED} ${key}"
            fi
          done

          if [ -z "$CHANGED" ]; then
            echo ""
            echo "All modules at current versions already published. Nothing to do."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo ""
            echo "Modules to process:${CHANGED}"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "changed=${CHANGED}" >> "$GITHUB_OUTPUT"
          fi

      - uses: cue-lang/setup-cue@a93fa358375740cd8b0078f76355512b9208acb1 # v1.0.1
        if: steps.check.outputs.has_changes == 'true'
        with:
          version: ${{ env.CUE_VERSION }}

      - name: Login to GHCR
        if: steps.check.outputs.has_changes == 'true'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Check formatting
        if: steps.check.outputs.has_changes == 'true'
        run: |
          set -euo pipefail
          for dir in core/v1alpha1 opm/v1alpha1 gateway_api/v1alpha1 \
                     cert_manager/v1alpha1 k8up/v1alpha1 kubernetes/v1; do
            (cd "$dir" && cue fmt ./...)
          done
          if ! git diff --quiet; then
            echo "::error::CUE files are not formatted. Run 'cue fmt ./...' locally."
            git diff --name-only
            exit 1
          fi

      - name: Validate and publish modules
        if: steps.check.outputs.has_changes == 'true'
        run: |
          set -euo pipefail

          MODULE="${{ inputs.module || 'all' }}"
          DRY_RUN="${{ inputs.dry_run || 'false' }}"
          CHANGED="${{ steps.check.outputs.changed }}"

          should_process() {
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              [ "$MODULE" = "all" ] || [ "$MODULE" = "$1" ]
            else
              echo " $CHANGED " | grep -q " $1 "
            fi
          }

          vet_module() {
            local key="$1" dir="$2"
            shift 2
            local vet_paths=("$@")
            echo "  vet: ${key}..."
            (cd "$dir" && cue vet "${vet_paths[@]}")
          }

          test_module() {
            local key="$1" dir="$2"
            shift 2
            local test_paths=("$@")
            local output
            if output=$(cd "$dir" && cue vet -t test "${test_paths[@]}" 2>&1); then
              echo "  test: pass"
            elif echo "$output" | grep -q 'tag "test" not used in any file'; then
              echo "  test: skip (no tests)"
            else
              echo "$output" >&2
              echo "  test: FAIL"
              return 1
            fi
          }

          publish_module() {
            local key="$1" api_ver="$2" dir="$3"
            if [ "$DRY_RUN" = "true" ]; then
              echo "  publish: skipped (dry run)"
              return
            fi
            local version
            version=$(yq ".${key}.${api_ver}.version" versions.yml)
            echo "  publish: ${key}/${api_ver}@${version}..."
            (cd "$dir" && cue mod publish "${version}")
            echo "  published: ${key}/${api_ver}@${version}"
          }

          # Process each module in dependency order.
          # Each module is validated then published before the next,
          # so downstream modules can resolve deps from GHCR.

          OPM_PATHS=(./schemas/... ./resources/... ./traits/... ./blueprints/... ./providers/...)

          if should_process core; then
            echo "=== core/v1alpha1 ==="
            vet_module core core/v1alpha1 ./...
            test_module core core/v1alpha1 ./...
            publish_module core v1alpha1 core/v1alpha1
          fi

          if should_process opm; then
            echo "=== opm/v1alpha1 ==="
            vet_module opm opm/v1alpha1 "${OPM_PATHS[@]}"
            test_module opm opm/v1alpha1 "${OPM_PATHS[@]}"
            publish_module opm v1alpha1 opm/v1alpha1
          fi

          if should_process gateway_api; then
            echo "=== gateway_api/v1alpha1 ==="
            vet_module gateway_api gateway_api/v1alpha1 ./...
            test_module gateway_api gateway_api/v1alpha1 ./...
            publish_module gateway_api v1alpha1 gateway_api/v1alpha1
          fi

          if should_process cert_manager; then
            echo "=== cert_manager/v1alpha1 ==="
            vet_module cert_manager cert_manager/v1alpha1 ./...
            test_module cert_manager cert_manager/v1alpha1 ./...
            publish_module cert_manager v1alpha1 cert_manager/v1alpha1
          fi

          if should_process k8up; then
            echo "=== k8up/v1alpha1 ==="
            vet_module k8up k8up/v1alpha1 ./...
            test_module k8up k8up/v1alpha1 ./...
            publish_module k8up v1alpha1 k8up/v1alpha1
          fi

          if should_process kubernetes; then
            echo "=== kubernetes/v1 ==="
            vet_module kubernetes kubernetes/v1 ./...
            test_module kubernetes kubernetes/v1 ./...
            publish_module kubernetes v1 kubernetes/v1
          fi

          echo ""
          echo "Done."
