name: Publish Catalog Modules

on:
  push:
    branches: [main]
    paths:
      - 'versions.yml'
  workflow_dispatch:
    inputs:
      module:
        description: 'Module to publish'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - core
          - opm
          - gateway_api
          - cert_manager
          - k8up
          - kubernetes
      dry_run:
        description: 'Validate only, skip publish'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

env:
  CUE_VERSION: 'v0.16.0'
  CUE_REGISTRY: 'opmodel.dev=ghcr.io/open-platform-model,registry.cue.works'

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cue-lang/setup-cue@a93fa358375740cd8b0078f76355512b9208acb1 # v1.0.1
        with:
          version: ${{ env.CUE_VERSION }}

      # Auth needed to pull opmodel.dev deps from GHCR during vet
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Check formatting
        run: |
          set -euo pipefail
          for dir in core/v1alpha1 opm/v1alpha1 gateway_api/v1alpha1 \
                     cert_manager/v1alpha1 k8up/v1alpha1 kubernetes/v1; do
            (cd "$dir" && cue fmt ./...)
          done
          if ! git diff --quiet; then
            echo "::error::CUE files are not formatted. Run 'cue fmt ./...' locally."
            git diff --name-only
            exit 1
          fi

      - name: Vet modules
        run: |
          set -euo pipefail
          echo "Vetting core/v1alpha1..."
          (cd core/v1alpha1 && cue vet ./...)

          echo "Vetting opm/v1alpha1..."
          (cd opm/v1alpha1 && cue vet ./schemas/... ./resources/... ./traits/... ./blueprints/... ./providers/...)

          echo "Vetting gateway_api/v1alpha1..."
          (cd gateway_api/v1alpha1 && cue vet ./...)

          echo "Vetting cert_manager/v1alpha1..."
          (cd cert_manager/v1alpha1 && cue vet ./...)

          echo "Vetting k8up/v1alpha1..."
          (cd k8up/v1alpha1 && cue vet ./...)

          echo "Vetting kubernetes/v1..."
          (cd kubernetes/v1 && cue vet ./...)

      - name: Run tests
        run: |
          set -euo pipefail

          run_tests() {
            local dir="$1"
            local label="$2"
            local output
            if output=$(cd "$dir" && cue vet -t test ./... 2>&1); then
              echo "  pass: ${label}"
            elif echo "$output" | grep -q 'tag "test" not used in any file'; then
              echo "  skip: ${label} (no tests)"
            else
              echo "$output" >&2
              echo "  FAIL: ${label}"
              return 1
            fi
          }

          # opm tests use selective paths
          run_tests_opm() {
            local output
            if output=$(cd opm/v1alpha1 && cue vet -t test \
              ./schemas/... ./resources/... ./traits/... ./blueprints/... ./providers/... 2>&1); then
              echo "  pass: opm/v1alpha1"
            elif echo "$output" | grep -q 'tag "test" not used in any file'; then
              echo "  skip: opm/v1alpha1 (no tests)"
            else
              echo "$output" >&2
              echo "  FAIL: opm/v1alpha1"
              return 1
            fi
          }

          run_tests core/v1alpha1 core/v1alpha1
          run_tests_opm
          run_tests gateway_api/v1alpha1 gateway_api/v1alpha1
          run_tests cert_manager/v1alpha1 cert_manager/v1alpha1
          run_tests k8up/v1alpha1 k8up/v1alpha1
          run_tests kubernetes/v1 kubernetes/v1

  publish:
    name: Publish to GHCR
    needs: validate
    runs-on: ubuntu-latest
    if: ${{ !(inputs.dry_run || false) }}
    steps:
      - uses: actions/checkout@v4

      - uses: cue-lang/setup-cue@a93fa358375740cd8b0078f76355512b9208acb1 # v1.0.1
        with:
          version: ${{ env.CUE_VERSION }}

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Install yq
        uses: mikefarah/yq@master
        with:
          cmd: echo "yq installed"

      - name: Publish modules
        run: |
          set -euo pipefail

          MODULE="${{ inputs.module || 'all' }}"

          publish_module() {
            local key="$1" api_ver="$2" dir="$3"
            local version
            version=$(yq ".${key}.${api_ver}.version" versions.yml)
            echo "Publishing ${key}/${api_ver}@${version} to ghcr.io/open-platform-model..."
            (cd "$dir" && cue mod publish "${version}")
            echo "  published: ${key}/${api_ver}@${version}"
          }

          should_publish() {
            [ "$MODULE" = "all" ] || [ "$MODULE" = "$1" ]
          }

          # Dependency order: core -> opm -> gateway_api, cert_manager, k8up, kubernetes
          should_publish core         && publish_module core         v1alpha1 core/v1alpha1
          should_publish opm          && publish_module opm          v1alpha1 opm/v1alpha1
          should_publish gateway_api  && publish_module gateway_api  v1alpha1 gateway_api/v1alpha1
          should_publish cert_manager && publish_module cert_manager v1alpha1 cert_manager/v1alpha1
          should_publish k8up         && publish_module k8up         v1alpha1 k8up/v1alpha1
          should_publish kubernetes   && publish_module kubernetes   v1       kubernetes/v1

          echo ""
          echo "Done."
