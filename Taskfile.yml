  # ============================================================================
  # Testing
  # ============================================================================

  test:
    desc: Run structural tests (@if(test) files) across all domain modules
    summary: |
      Runs all *_tests.cue files tagged @if(test) across all domain modules.
      Tests use CUE unification for assertions — a test fails when the computed
      output conflicts with the asserted expected value.

      Usage:
        task test
        task test:core
        task test:opm
        task test:gateway_api
        task test:cert_manager
        task test:kubernetes
    cmds:
      - task: test:core
      - task: test:opm
      - task: test:opm_experiments
      - task: test:gateway_api
      - task: test:cert_manager
      - task: test:k8up
      - task: test:kubernetes
      - task: test:ch_vmm
      - task: test:mongodb_operator
      - task: test:clickhouse_operator
      - task: test:otel_collector
      - task: test:istio

  test:core:
    desc: Run core/v1alpha1 structural tests (@if(test) files)
    cmds:
      - |
        GREEN='\033[0;32m'; RED='\033[0;31m'; DIM='\033[2m'; NC='\033[0m'
        echo "Testing core/v1alpha1 (structural)..."
        OUTPUT=$(cd "{{.TASKFILE_DIR}}/{{.CORE_DIR}}" && cue vet -t test ./... 2>&1) && {
          echo -e "${GREEN}✔ core/v1alpha1 — Successful${NC}"
        } || {
          if echo "$OUTPUT" | grep -q 'tag "test" not used in any file'; then
            echo -e "${DIM}○ core/v1alpha1 — No tests found, skipping${NC}"
          else
            echo "$OUTPUT" >&2
            echo -e "${RED}✗ core/v1alpha1 — Failed${NC}"
            exit 1
          fi
        }

  test:opm:
    desc: Run opm/v1alpha1 transformer structural tests (@if(test) files)
    summary: |
      Runs all *_tests.cue files tagged @if(test) in the opm/v1alpha1 module.

      Tests use CUE unification for assertions — a test fails when the computed
      transformer output conflicts with the asserted expected value.

      Runs WITHOUT -c (concreteness) because transformer outputs include intermediate
      computed fields that depend on optional trait defaults. Use test:strict
      for fully-concrete subset tests.

      Usage:
        task test:opm
    cmds:
      - |
        GREEN='\033[0;32m'; RED='\033[0;31m'; DIM='\033[2m'; NC='\033[0m'
        echo "Testing opmodel.dev/opm/v1alpha1 (structural)..."
        OUTPUT=$(cd "{{.TASKFILE_DIR}}/{{.OPM_DIR}}" && cue vet -t test \
          ./schemas/... ./resources/... ./traits/... ./blueprints/... ./providers/... 2>&1) && {
          echo -e "${GREEN}✔ opm/v1alpha1 — Successful${NC}"
        } || {
          if echo "$OUTPUT" | grep -q 'tag "test" not used in any file'; then
            echo -e "${DIM}○ opm/v1alpha1 — No tests found, skipping${NC}"
