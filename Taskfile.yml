  # ============================================================================
  # Module Management
  # ============================================================================

  tidy:
    desc: Tidy dependencies across all domain modules
    cmds:
      - |
        for dir in "{{.CORE_DIR}}" "{{.OPM_DIR}}" "{{.OPM_EXPERIMENTS_DIR}}" "{{.GATEWAY_API_DIR}}" "{{.CERT_MANAGER_DIR}}" "{{.K8UP_DIR}}" "{{.KUBERNETES_DIR}}" "{{.CH_VMM_DIR}}" "{{.MONGODB_OPERATOR_DIR}}" "{{.CLICKHOUSE_OPERATOR_DIR}}" "{{.OTEL_COLLECTOR_DIR}}" "{{.ISTIO_DIR}}"; do
          echo "Tidying ${dir}..."
          (cd "{{.TASKFILE_DIR}}/${dir}" && cue mod tidy)
        done
        echo "Done"

  eval:
    desc: Evaluate CUE files in a specific module (DOMAIN=core|opm|opm_experiments|gateway_api|cert_manager|kubernetes|k8up|ch_vmm)
    summary: |
      Evaluate CUE files in a specific domain module.

      Usage:
        task eval DOMAIN=opm
        task eval DOMAIN=core OUTPUT=out.cue    # Write output to file
    vars:
      DOMAIN: '{{.DOMAIN | default "opm"}}'
      OUTPUT: '{{.OUTPUT | default ""}}'
    cmds:
      - |
        case "{{.DOMAIN}}" in
          core)                DIR="{{.CORE_DIR}}" ;;
          opm)                 DIR="{{.OPM_DIR}}" ;;
          opm_experiments)     DIR="{{.OPM_EXPERIMENTS_DIR}}" ;;
          gateway_api)         DIR="{{.GATEWAY_API_DIR}}" ;;
          cert_manager)        DIR="{{.CERT_MANAGER_DIR}}" ;;
          k8up)                DIR="{{.K8UP_DIR}}" ;;
          kubernetes)          DIR="{{.KUBERNETES_DIR}}" ;;
          ch_vmm)              DIR="{{.CH_VMM_DIR}}" ;;
          mongodb_operator)    DIR="{{.MONGODB_OPERATOR_DIR}}" ;;
          clickhouse_operator) DIR="{{.CLICKHOUSE_OPERATOR_DIR}}" ;;
          otel_collector)      DIR="{{.OTEL_COLLECTOR_DIR}}" ;;
          istio)               DIR="{{.ISTIO_DIR}}" ;;
          *)
            echo "Unknown DOMAIN: {{.DOMAIN}}. Use core, opm, opm_experiments, gateway_api, cert_manager, k8up, kubernetes, ch_vmm, mongodb_operator, clickhouse_operator, otel_collector, or istio."
            exit 1
            ;;
        esac
        echo "Evaluating ${DIR}..."
        if [ -n "{{.OUTPUT}}" ]; then
          cd "{{.TASKFILE_DIR}}/${DIR}" && cue eval ./... > "{{.OUTPUT}}"
        else
          cd "{{.TASKFILE_DIR}}/${DIR}" && cue eval ./...
        fi
        echo "Done"

  # ============================================================================
  # Combined Operations
  # ============================================================================

  check:
    desc: Run fmt and vet across all domain modules
    cmds:
      - task: fmt
      - task: vet

  # ============================================================================
  # Index Generation
  # ============================================================================

  generate:index:
    desc: Generate INDEX.md for all v1alpha1 modules
    cmds:
      - bash .tasks/generate-index.sh core/v1alpha1 > core/v1alpha1/INDEX.md
      - bash .tasks/generate-index.sh opm/v1alpha1 > opm/v1alpha1/INDEX.md
      - bash .tasks/generate-index.sh opm_experiments/v1alpha1 > opm_experiments/v1alpha1/INDEX.md
      - bash .tasks/generate-index.sh gateway_api/v1alpha1 > gateway_api/v1alpha1/INDEX.md
      - bash .tasks/generate-index.sh cert_manager/v1alpha1 > cert_manager/v1alpha1/INDEX.md
      - bash .tasks/generate-index.sh k8up/v1alpha1 > k8up/v1alpha1/INDEX.md
      - bash .tasks/generate-index.sh kubernetes/v1 > kubernetes/v1/INDEX.md
      - bash .tasks/generate-index.sh ch_vmm/v1alpha1 > ch_vmm/v1alpha1/INDEX.md
      - bash .tasks/generate-index.sh mongodb_operator/v1alpha1 > mongodb_operator/v1alpha1/INDEX.md
      - bash .tasks/generate-index.sh clickhouse_operator/v1alpha1 > clickhouse_operator/v1alpha1/INDEX.md
      - bash .tasks/generate-index.sh otel_collector/v1alpha1 > otel_collector/v1alpha1/INDEX.md
      - bash .tasks/generate-index.sh istio/v1alpha1 > istio/v1alpha1/INDEX.md

  generate:index:check:
    desc: Verify INDEX.md files match generated output (exits non-zero if any differ)
    cmds:
      - |
        set -euo pipefail
        TMPDIR_CHECK=$(mktemp -d)
        trap 'rm -rf "$TMPDIR_CHECK"' EXIT

        check_module() {
          local dir="$1"
          local expected="$dir/INDEX.md"
          local generated="$TMPDIR_CHECK/$(echo "$dir" | tr '/' '_').md"

          bash .tasks/generate-index.sh "$dir" > "$generated"

          if [[ ! -f "$expected" ]]; then
            echo "FAIL: $expected does not exist — run 'task generate:index' to create it"
            return 1
          fi

          if ! diff -q "$expected" "$generated" > /dev/null 2>&1; then
            echo "FAIL: $expected is out of date"
            diff "$expected" "$generated" || true
            return 1
          fi

          echo "OK: $expected"
        }

        FAILED=0
        check_module core/v1alpha1                || FAILED=1
        check_module opm/v1alpha1                 || FAILED=1
        check_module opm_experiments/v1alpha1     || FAILED=1
        check_module gateway_api/v1alpha1         || FAILED=1
        check_module cert_manager/v1alpha1        || FAILED=1
        check_module k8up/v1alpha1                || FAILED=1
        check_module kubernetes/v1                || FAILED=1
        check_module ch_vmm/v1alpha1              || FAILED=1
        check_module mongodb_operator/v1alpha1    || FAILED=1
        check_module clickhouse_operator/v1alpha1 || FAILED=1
        check_module otel_collector/v1alpha1      || FAILED=1
        check_module istio/v1alpha1               || FAILED=1

        if [[ "$FAILED" -eq 1 ]]; then
          echo ""
          echo "Run 'task generate:index' to regenerate INDEX.md files."
          exit 1
        fi

        echo ""
        echo "All INDEX.md files are up to date."

  # ============================================================================
  # Version Management
  # ============================================================================

  version:
    desc: Show current versions for all domain modules
    preconditions:
      - sh: command -v yq >/dev/null 2>&1
        msg: "yq is required. Install: brew install yq"
    cmds:
      - |
        echo "core/v1alpha1:                $(yq '.core.v1alpha1.version' {{.VERSION_FILE}})"
        echo "opm/v1alpha1:                 $(yq '.opm.v1alpha1.version' {{.VERSION_FILE}})"
        echo "opm_experiments/v1alpha1:     $(yq '.opm_experiments.v1alpha1.version' {{.VERSION_FILE}})"
        echo "gateway_api/v1alpha1:         $(yq '.gateway_api.v1alpha1.version' {{.VERSION_FILE}})"
        echo "cert_manager/v1alpha1:        $(yq '.cert_manager.v1alpha1.version' {{.VERSION_FILE}})"
        echo "k8up/v1alpha1:                $(yq '.k8up.v1alpha1.version' {{.VERSION_FILE}})"
        echo "kubernetes/v1:                $(yq '.kubernetes.v1.version' {{.VERSION_FILE}})"
        echo "ch_vmm/v1alpha1:              $(yq '.ch_vmm.v1alpha1.version' {{.VERSION_FILE}})"
        echo "mongodb_operator/v1alpha1:    $(yq '.mongodb_operator.v1alpha1.version' {{.VERSION_FILE}})"
        echo "clickhouse_operator/v1alpha1: $(yq '.clickhouse_operator.v1alpha1.version' {{.VERSION_FILE}})"
        echo "otel_collector/v1alpha1:      $(yq '.otel_collector.v1alpha1.version' {{.VERSION_FILE}})"
        echo "istio/v1alpha1:               $(yq '.istio.v1alpha1.version' {{.VERSION_FILE}})"

  version:bump:
    desc: Bump version for a domain module (DOMAIN=core|opm|gateway_api|cert_manager|kubernetes TYPE=patch/minor/major)
    summary: |
      Bump the version for a specific domain module following SemVer.

      Usage:
        task version:bump DOMAIN=opm              # Bump opm patch (default)
        task version:bump DOMAIN=core TYPE=minor  # v1.0.0 -> v1.1.0
        task version:bump DOMAIN=opm TYPE=major   # v1.0.0 -> v2.0.0
    vars:
      DOMAIN: '{{.DOMAIN | default "opm"}}'
      TYPE: '{{.TYPE | default "patch"}}'
    preconditions:
      - sh: command -v yq >/dev/null 2>&1
        msg: "yq is required. Install: brew install yq"
    cmds:
      - |
        case "{{.DOMAIN}}" in
          core|opm|opm_experiments|gateway_api|cert_manager|k8up|kubernetes|ch_vmm|mongodb_operator|clickhouse_operator|otel_collector|istio) ;;
          *)
            echo "Unknown DOMAIN: {{.DOMAIN}}. Use core, opm, opm_experiments, gateway_api, cert_manager, k8up, kubernetes, ch_vmm, mongodb_operator, clickhouse_operator, otel_collector, or istio."
            exit 1
            ;;
        esac

        case "{{.DOMAIN}}" in
          kubernetes) API_VERSION="v1" ;;
          *)          API_VERSION="v1alpha1" ;;
        esac

        CURRENT=$(yq ".{{.DOMAIN}}.${API_VERSION}.version" {{.VERSION_FILE}} | sed 's/^v//')
        IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

        case "{{.TYPE}}" in
          major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
          minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
          patch) PATCH=$((PATCH + 1)) ;;
          *)
            echo "Invalid TYPE: {{.TYPE}}. Use patch, minor, or major."
            exit 1
            ;;
        esac

        NEW="v${MAJOR}.${MINOR}.${PATCH}"
        yq -i ".{{.DOMAIN}}.${API_VERSION}.version = \"${NEW}\"" {{.VERSION_FILE}}
        echo "Bumped {{.DOMAIN}}/${API_VERSION}: v${CURRENT} -> ${NEW}"

