  # ============================================================================
  # Publishing — aggregate
  # ============================================================================

  publish:local:
    desc: Publish all domain modules to local registry in dependency order
    summary: |
      Publish all five domain modules in dependency order:
        core/v1alpha1 → opm/v1alpha1 → gateway_api/v1alpha1, cert_manager/v1alpha1, kubernetes/v1

      Uses the version recorded in versions.yml for each module.

      Usage:
        task publish:local
    preconditions:
      - sh: command -v yq >/dev/null 2>&1
        msg: "yq is required. Install: brew install yq"
      - sh: command -v cue >/dev/null 2>&1
        msg: "cue is required"
    cmds:
      - |
        set -euo pipefail
        BOLD='\033[1m'; GREEN='\033[0;32m'; RED='\033[0;31m'; RESET='\033[0m'

        echo -e "${BOLD}Publishing all domain modules...${RESET}"

        publish_module() {
          local key="$1"
          local api_version="$2"
          local dir="$3"
          local version
          version=$(yq ".${key}.${api_version}.version" "{{.VERSION_FILE}}")
          echo -e "${BOLD}[${key}/${api_version}]${RESET} publishing @ ${version}..."
          if (cd "{{.TASKFILE_DIR}}/${dir}" && cue mod publish "${version}"); then
            echo -e "  ${GREEN}✔ ${key}/${api_version}@${version}${RESET}"
          else
            echo -e "  ${RED}✗ Failed to publish ${key}/${api_version}${RESET}"
            exit 1
          fi
        }

        publish_module "core"                "v1alpha1" "{{.CORE_DIR}}"
        publish_module "opm"                 "v1alpha1" "{{.OPM_DIR}}"
        publish_module "opm_experiments"     "v1alpha1" "{{.OPM_EXPERIMENTS_DIR}}"
        publish_module "gateway_api"         "v1alpha1" "{{.GATEWAY_API_DIR}}"
        publish_module "cert_manager"        "v1alpha1" "{{.CERT_MANAGER_DIR}}"
        publish_module "k8up"                "v1alpha1" "{{.K8UP_DIR}}"
        publish_module "kubernetes"          "v1"       "{{.KUBERNETES_DIR}}"
        publish_module "ch_vmm"              "v1alpha1" "{{.CH_VMM_DIR}}"
        publish_module "mongodb_operator"    "v1alpha1" "{{.MONGODB_OPERATOR_DIR}}"
        publish_module "clickhouse_operator" "v1alpha1" "{{.CLICKHOUSE_OPERATOR_DIR}}"
        publish_module "otel_collector"      "v1alpha1" "{{.OTEL_COLLECTOR_DIR}}"
        publish_module "istio"               "v1alpha1" "{{.ISTIO_DIR}}"

        echo ""
        echo -e "${BOLD}${GREEN}Done.${RESET} All domain modules published."

  publish:smart:
    desc: Detect changes per domain, bump versions independently, and publish changed modules
    deps:
      - fmt
      - vet
    summary: |
      For each domain module, computes a SHA-256 checksum of .cue files
      (excluding cue.mod/), compares with the stored checksum in versions.yml,
      and publishes only modules that changed.

      Modules are published in dependency order:
        core/v1alpha1 → opm/v1alpha1 → gateway_api/v1alpha1, cert_manager/v1alpha1, kubernetes/v1

      Each module is versioned independently. A patch bump is applied by default.

      Usage:
        task publish:smart                   # Detect, bump patch, publish
        task publish:smart DRY_RUN=true      # Preview without executing
        task publish:smart TYPE=minor        # Minor bump instead of patch
    vars:
      DRY_RUN: '{{.DRY_RUN | default "false"}}'
      TYPE: '{{.TYPE | default "patch"}}'
    preconditions:
      - sh: command -v yq >/dev/null 2>&1
        msg: "yq is required. Install: brew install yq"
      - sh: command -v cue >/dev/null 2>&1
        msg: "cue is required. Install: go install cuelang.org/go/cmd/cue@latest"
      - sh: command -v git >/dev/null 2>&1
        msg: "git is required"
    cmds:
      - |
        #!/usr/bin/env bash
        set -euo pipefail

        VERSION_FILE="{{.VERSION_FILE}}"
        DRY_RUN="{{.DRY_RUN}}"
        BUMP_TYPE="{{.TYPE}}"

        BOLD='\033[1m'; DIM='\033[2m'; RED='\033[0;31m'; GREEN='\033[0;32m'; YELLOW='\033[0;33m'; RESET='\033[0m'

        compute_checksum() {
          local dir="$1"
          find "{{.TASKFILE_DIR}}/${dir}" -name '*.cue' -not -path '*/cue.mod/*' | sort | xargs sha256sum | sha256sum | awk '{print $1}'
        }

        bump_version() {
          local ver="${1#v}"
          IFS='.' read -r major minor patch <<< "$ver"
          case "$2" in
            major) major=$((major+1)); minor=0; patch=0 ;;
            minor) minor=$((minor+1)); patch=0 ;;
            patch) patch=$((patch+1)) ;;
          esac
          echo "v${major}.${minor}.${patch}"
        }

        echo -e "${BOLD}Phase 1: Detecting changes...${RESET}"

        CHANGED_KEYS=()
        CHANGED_API_VERSIONS=()
        CHANGED_DIRS=()
        CHANGED_VERSIONS=()

        check_module() {
          local key="$1"
          local api_version="$2"
          local dir="$3"
          local stored current version new_version
          stored=$(yq ".${key}.${api_version}.checksum // \"\"" "$VERSION_FILE")
          current=$(compute_checksum "$dir")
          version=$(yq ".${key}.${api_version}.version" "$VERSION_FILE")
          new_version=$(bump_version "$version" "$BUMP_TYPE")
          if [ -z "$stored" ]; then
            echo -e "  ${YELLOW}${key}/${api_version}${RESET}: changed (no stored checksum) → ${version} → ${GREEN}${new_version}${RESET}"
            CHANGED_KEYS+=("$key")
            CHANGED_API_VERSIONS+=("$api_version")
            CHANGED_DIRS+=("$dir")
            CHANGED_VERSIONS+=("$new_version")
          elif [ "$stored" != "$current" ]; then
            echo -e "  ${YELLOW}${key}/${api_version}${RESET}: changed → ${version} → ${GREEN}${new_version}${RESET}"
            CHANGED_KEYS+=("$key")
            CHANGED_API_VERSIONS+=("$api_version")
            CHANGED_DIRS+=("$dir")
            CHANGED_VERSIONS+=("$new_version")
          else
            echo -e "  ${key}/${api_version}: unchanged"
          fi
        }

        check_module "core"                "v1alpha1" "{{.CORE_DIR}}"
        check_module "opm"                 "v1alpha1" "{{.OPM_DIR}}"
        check_module "opm_experiments"     "v1alpha1" "{{.OPM_EXPERIMENTS_DIR}}"
        check_module "gateway_api"         "v1alpha1" "{{.GATEWAY_API_DIR}}"
        check_module "cert_manager"        "v1alpha1" "{{.CERT_MANAGER_DIR}}"
        check_module "k8up"                "v1alpha1" "{{.K8UP_DIR}}"
        check_module "kubernetes"          "v1"       "{{.KUBERNETES_DIR}}"
        check_module "ch_vmm"              "v1alpha1" "{{.CH_VMM_DIR}}"
        check_module "mongodb_operator"    "v1alpha1" "{{.MONGODB_OPERATOR_DIR}}"
        check_module "clickhouse_operator" "v1alpha1" "{{.CLICKHOUSE_OPERATOR_DIR}}"
        check_module "otel_collector"      "v1alpha1" "{{.OTEL_COLLECTOR_DIR}}"
        check_module "istio"               "v1alpha1" "{{.ISTIO_DIR}}"

        if [ ${#CHANGED_KEYS[@]} -eq 0 ]; then
          echo ""
          echo -e "${GREEN}No changes detected. Nothing to publish.${RESET}"
          exit 0
        fi

        if [ "$DRY_RUN" = "true" ]; then
          echo ""
          echo -e "${BOLD}Dry run — no changes made.${RESET}"
          exit 0
        fi

        # ── Phase 2: Publish changed modules ─────────────────────────

        echo ""
        echo -e "${BOLD}Phase 2: Publishing...${RESET}"

        for i in "${!CHANGED_KEYS[@]}"; do
          key="${CHANGED_KEYS[$i]}"
          api_ver="${CHANGED_API_VERSIONS[$i]}"
          dir="${CHANGED_DIRS[$i]}"
          new_version="${CHANGED_VERSIONS[$i]}"

          echo ""
          echo -e "${BOLD}${GREEN}[${key}/${api_ver}]${RESET} → ${GREEN}${new_version}${RESET}"

          # Bump version in versions.yml
          yq -i ".${key}.${api_ver}.version = \"${new_version}\"" "$VERSION_FILE"

          # Tidy
          echo "  Tidying..."
          (cd "{{.TASKFILE_DIR}}/${dir}" && cue mod tidy)

          # Publish
          echo "  Publishing ${key}/${api_ver}@${new_version}..."
          if ! (cd "{{.TASKFILE_DIR}}/${dir}" && cue mod publish "${new_version}"); then
            echo -e "  ${RED}Failed to publish ${key}/${api_ver}${RESET}"
            exit 1
          fi

          # Tag — format: catalog/<domain>/<api_version>/<version>
          git tag "catalog/${key}/${api_ver}/${new_version}"
          echo "  Tagged catalog/${key}/${api_ver}/${new_version}"

          # Store updated checksum
          new_checksum=$(compute_checksum "$dir")
          yq -i ".${key}.${api_ver}.checksum = \"${new_checksum}\"" "$VERSION_FILE"
          echo -e "  Checksum: ${DIM}${new_checksum:0:12}...${RESET}"
        done

        echo ""
        echo -e "${BOLD}${GREEN}Done.${RESET} Published ${#CHANGED_KEYS[@]} domain module(s)."
