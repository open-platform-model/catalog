version: '3'

# Catalog CUE Module Taskfile
# Tasks for the domain-structured modules:
#   core/v1alpha1, opm/v1alpha1, gateway_api/v1alpha1, cert_manager/v1alpha1, k8up/v1alpha1, kubernetes/v1
#
# Usage:
#   task fmt
#   task vet
#   task test
#   task publish:local
#   task publish:smart

# Silent by default - set TASK_VERBOSE=1 or use --verbose to show commands
silent: true

includes:
  # Core configuration (provides shared variables)
  config:
    taskfile: .tasks/config.yml
    internal: true

  # Docker OCI registry management
  registry:
    taskfile: .tasks/registry/docker.yml
    dir: .

env:
  CUE_REGISTRY: '{{.LOCAL_REGISTRY}}'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # ============================================================================
  # Formatting
  # ============================================================================

  fmt:
    desc: Format CUE files across all domain modules
    cmds:
      - |
        for dir in "{{.CORE_DIR}}" "{{.OPM_DIR}}" "{{.OPM_EXPERIMENTS_DIR}}" "{{.GATEWAY_API_DIR}}" "{{.CERT_MANAGER_DIR}}" "{{.K8UP_DIR}}" "{{.KUBERNETES_DIR}}" "{{.CH_VMM_DIR}}" "{{.MONGODB_OPERATOR_DIR}}" "{{.CLICKHOUSE_OPERATOR_DIR}}" "{{.OTEL_COLLECTOR_DIR}}" "{{.ISTIO_DIR}}"; do
          echo "Formatting ${dir}..."
          (cd "{{.TASKFILE_DIR}}/${dir}" && cue fmt ./...)
        done
        echo "Done"

  # ============================================================================
  # Validation
  # ============================================================================

  vet:
    desc: Validate all domain CUE modules in dependency order
    summary: |
      Validates all domain modules in dependency order:
        core/v1alpha1 → opm/v1alpha1 → gateway_api/v1alpha1, cert_manager/v1alpha1, kubernetes/v1, ch_vmm/v1alpha1

      Usage:
        task vet
        task vet CONCRETE=true    # Validate with concreteness checks
    cmds:
      - task: vet:core
      - task: vet:opm
      - task: vet:opm_experiments
      - task: vet:gateway_api
      - task: vet:cert_manager
      - task: vet:k8up
      - task: vet:kubernetes
      - task: vet:ch_vmm
      - task: vet:mongodb_operator
      - task: vet:clickhouse_operator
      - task: vet:otel_collector
      - task: vet:istio

  vet:core:
    desc: Validate core/v1alpha1 CUE module
    vars:
      CONCRETE: '{{.CONCRETE | default "false"}}'
      VET_FLAGS: '{{if eq .CONCRETE "true"}}-c{{end}}'
    cmds:
      - |
        echo "Validating {{.CORE_DIR}}{{if eq .CONCRETE "true"}} (concrete){{end}}..."
        cd "{{.TASKFILE_DIR}}/{{.CORE_DIR}}" && cue vet {{.VET_FLAGS}} ./...
        echo "  ✔ core/v1alpha1"

  vet:opm:
    desc: Validate opm/v1alpha1 CUE module
    vars:
      CONCRETE: '{{.CONCRETE | default "false"}}'
      VET_FLAGS: '{{if eq .CONCRETE "true"}}-c{{end}}'
    cmds:
      - |
        echo "Validating {{.OPM_DIR}}{{if eq .CONCRETE "true"}} (concrete){{end}}..."
        cd "{{.TASKFILE_DIR}}/{{.OPM_DIR}}" && cue vet {{.VET_FLAGS}} \
          ./schemas/... ./resources/... ./traits/... ./blueprints/... ./providers/...
        echo "  ✔ opm/v1alpha1"

  vet:opm_experiments:
    desc: Validate opm_experiments/v1alpha1 CUE module
    vars:
      CONCRETE: '{{.CONCRETE | default "false"}}'
      VET_FLAGS: '{{if eq .CONCRETE "true"}}-c{{end}}'
    cmds:
      - |
        echo "Validating {{.OPM_EXPERIMENTS_DIR}}{{if eq .CONCRETE "true"}} (concrete){{end}}..."
        cd "{{.TASKFILE_DIR}}/{{.OPM_EXPERIMENTS_DIR}}" && cue vet {{.VET_FLAGS}} ./...
        echo "  ✔ opm_experiments/v1alpha1"

  vet:gateway_api:
