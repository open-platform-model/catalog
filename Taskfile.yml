version: '3'

# Catalog CUE Module Taskfile
# Tasks for the v1alpha1/ module (opmodel.dev@v1).
#
# Usage:
#   task fmt
#   task vet
#   task publish:local
#   task publish:smart

# Silent by default - set TASK_VERBOSE=1 or use --verbose to show commands
silent: true

includes:
  # Core configuration (provides shared variables)
  config:
    taskfile: .tasks/config.yml
    internal: true

  # Docker OCI registry management
  registry:
    taskfile: .tasks/registry/docker.yml
    dir: .

  # Dependency management
  deps:
    taskfile: .tasks/deps.yml
    dir: .

env:
  CUE_REGISTRY: '{{.LOCAL_REGISTRY}}'
  CUE_CACHE_DIR: '{{.TASKFILE_DIR}}/../.cue-cache'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # ============================================================================
  # Formatting
  # ============================================================================

  fmt:
    desc: Format CUE files
    cmds:
      - |
        echo "Formatting {{.V1ALPHA1_DIR}}..."
        cd "{{.V1ALPHA1_DIR}}" && cue fmt ./...
        echo "Done"

  # ============================================================================
  # Validation
  # ============================================================================

  vet:
    desc: Validate CUE files (excludes examples — use vet:examples for those)
    summary: |
      Validate CUE files in the v1alpha1 module, excluding the examples/ directory.
      Use 'task vet:examples' to validate examples separately.

      Usage:
        task vet
        task vet CONCRETE=true    # Validate with concreteness checks
    vars:
      CONCRETE: '{{.CONCRETE | default "false"}}'
      VET_FLAGS: '{{if eq .CONCRETE "true"}}-c{{end}}'
    cmds:
      - |
        echo "Validating {{.V1ALPHA1_DIR}} (excluding examples){{if eq .CONCRETE "true"}} (concrete){{end}}..."
        cd "{{.V1ALPHA1_DIR}}" && cue vet {{.VET_FLAGS}} \
          ./core/... ./schemas/... ./resources/... ./traits/... ./blueprints/... ./providers/...
        echo "Done"

  vet:examples:
    desc: Validate CUE files in the examples/ directory
    summary: |
      Validate CUE files in v1alpha1/examples/ separately.
      Examples include alternative value files that conflict when evaluated together;
      this task surfaces those errors in isolation.

      Usage:
        task vet:examples
        task vet:examples CONCRETE=true
    vars:
      CONCRETE: '{{.CONCRETE | default "false"}}'
      VET_FLAGS: '{{if eq .CONCRETE "true"}}-c{{end}}'
    cmds:
      - |
        if [ ! -d "{{.V1ALPHA1_DIR}}/examples" ]; then
          echo "Skipping {{.V1ALPHA1_DIR}}/examples (directory does not exist)"
          exit 0
        fi
        echo "Validating {{.V1ALPHA1_DIR}}/examples{{if eq .CONCRETE "true"}} (concrete){{end}}..."
        cd "{{.V1ALPHA1_DIR}}" && cue vet {{.VET_FLAGS}} ./examples/...
        echo "Done"

  eval:
    desc: Evaluate CUE files
    summary: |
      Evaluate CUE files in the v1alpha1 module.

      Usage:
        task eval
        task eval OUTPUT=out.cue    # Write output to file
    vars:
      OUTPUT: '{{.OUTPUT | default ""}}'
      EVAL_REDIRECT: '{{if .OUTPUT}}> {{.OUTPUT}}{{end}}'
    cmds:
      - |
        echo "Evaluating {{.V1ALPHA1_DIR}}..."
        cd "{{.V1ALPHA1_DIR}}" && cue eval ./... {{.EVAL_REDIRECT}}
        echo "Done"

  # ============================================================================
  # Module Management
  # ============================================================================

  tidy:
    desc: Tidy module dependencies
    cmds:
      - |
        echo "Tidying {{.V1ALPHA1_DIR}} dependencies..."
        cd "{{.V1ALPHA1_DIR}}" && cue mod tidy
        echo "Done"

  # ============================================================================
  # Combined Operations
  # ============================================================================

  check:
    desc: Run fmt and vet
    cmds:
      - task fmt
      - task vet

  # ============================================================================
  # v1alpha2 Validation & Tests
  # ============================================================================

  vet:v1alpha2:
    desc: Validate all v1alpha2 CUE modules (opm, gateway_api, cert_manager)
    summary: |
      Validates all three v1alpha2 modules in sequence.
      Skips gateway_api and cert_manager if their cue.mod/ has not been initialized yet.

      Usage:
        task vet:v1alpha2
    cmds:
      - task: vet:v1alpha2:opm
      - task: vet:v1alpha2:gateway
      - task: vet:v1alpha2:cert-manager

  vet:v1alpha2:opm:
    desc: Validate v1alpha2/opm CUE module
    cmds:
      - |
        cd "{{.TASKFILE_DIR}}/{{.V1ALPHA2_OPM_DIR}}" && cue vet \
          ./core/... ./schemas/... ./resources/... ./traits/... ./blueprints/... ./providers/...

  vet:v1alpha2:gateway:
    desc: Validate v1alpha2/gateway_api CUE module
    cmds:
      - cd "{{.TASKFILE_DIR}}/{{.V1ALPHA2_GATEWAY_DIR}}" && cue vet ./...

  vet:v1alpha2:cert-manager:
    desc: Validate v1alpha2/cert_manager CUE module
    cmds:
      - cd "{{.TASKFILE_DIR}}/{{.V1ALPHA2_CERT_MANAGER_DIR}}" && cue vet ./...

  test:v1alpha2:
    desc: Run all v1alpha2 structural tests across opm, gateway_api, and cert_manager
    summary: |
      Aggregate task — runs all @if(test) tagged test files across all three v1alpha2 modules:
        - opmodel.dev/opm@v1          (v1alpha2/opm)
        - opmodel.dev/gateway_api@v1  (v1alpha2/gateway_api)
        - opmodel.dev/cert-manager@v1 (v1alpha2/cert_manager)

      Matrix tests (cert_manager) are included naturally via ./...

      Usage:
        task test:v1alpha2
    cmds:
      - task: test:v1alpha2:opm
      - task: test:v1alpha2:gateway
      - task: test:v1alpha2:cert-manager

  test:v1alpha2:opm:
    desc: Run v1alpha2/opm transformer structural tests (@if(test) files)
    summary: |
      Runs all *_tests.cue files tagged @if(test) in the v1alpha2/opm module.

      Tests use CUE unification for assertions — a test fails when the computed
      transformer output conflicts with the asserted expected value.

      Runs WITHOUT -c (concreteness) because transformer outputs include intermediate
      computed fields that depend on optional trait defaults. Use test:v1alpha2:strict
      for fully-concrete subset tests.

      Usage:
        task test:v1alpha2:opm
    cmds:
      - |
        GREEN='\033[0;32m'; RED='\033[0;31m'; NC='\033[0m'
        echo "Testing opmodel.dev/opm@v1 (structural)..."
        if cd "{{.TASKFILE_DIR}}/{{.V1ALPHA2_OPM_DIR}}" && cue vet -t test \
          ./core/... ./schemas/... ./resources/... ./traits/... ./blueprints/... ./providers/...; then
          echo -e "${GREEN}✔ opmodel.dev/opm@v1 — Successful${NC}"
        else
          echo -e "${RED}✗ opmodel.dev/opm@v1 — Failed${NC}"
          exit 1
        fi

  test:v1alpha2:gateway:
    desc: Run v1alpha2/gateway_api transformer structural tests (@if(test) files)
    summary: |
      Runs all *_tests.cue files tagged @if(test) in the v1alpha2/gateway_api module.

      Tests use CUE unification for assertions — a test fails when the computed
      transformer output conflicts with the asserted expected value.

      Usage:
        task test:v1alpha2:gateway
    cmds:
      - |
        GREEN='\033[0;32m'; RED='\033[0;31m'; NC='\033[0m'
        echo "Testing opmodel.dev/gateway_api@v1 (structural)..."
        if cd "{{.TASKFILE_DIR}}/{{.V1ALPHA2_GATEWAY_DIR}}" && cue vet -t test ./...; then
          echo -e "${GREEN}✔ opmodel.dev/gateway_api@v1 — Successful${NC}"
        else
          echo -e "${RED}✗ opmodel.dev/gateway_api@v1 — Failed${NC}"
          exit 1
        fi

  test:v1alpha2:cert-manager:
    desc: Run v1alpha2/cert_manager transformer and matrix tests (@if(test) files)
    summary: |
      Runs all *_tests.cue and *_matrix_tests.cue files tagged @if(test) in the
      v1alpha2/cert_manager module. Matrix tests (certificate_matrix_tests.cue,
      issuer_matrix_tests.cue) are included naturally via ./...

      Usage:
        task test:v1alpha2:cert-manager
    cmds:
      - |
        GREEN='\033[0;32m'; RED='\033[0;31m'; NC='\033[0m'
        echo "Testing opmodel.dev/cert-manager@v1 (structural + matrix)..."
        if cd "{{.TASKFILE_DIR}}/{{.V1ALPHA2_CERT_MANAGER_DIR}}" && cue vet -t test ./...; then
          echo -e "${GREEN}✔ opmodel.dev/cert-manager@v1 — Successful${NC}"
        else
          echo -e "${RED}✗ opmodel.dev/cert-manager@v1 — Failed${NC}"
          exit 1
        fi

  test:v1alpha2:strict:
    desc: Run v1alpha2/opm tests with full concreteness checks (-c flag)
    summary: |
      Like test:v1alpha2 but adds -c (concreteness check).
      Only run this when all test values are fully concrete (no abstract type constraints
      in the final evaluated value). Schema conformance tests (like crd_tests.cue) pass
      with -c; transformer structural tests may not.

      Usage:
        task test:v1alpha2:strict
    cmds:
      - |
        GREEN='\033[0;32m'; RED='\033[0;31m'; NC='\033[0m'
        echo "Testing opmodel.dev/opm@v1 (structural, strict)..."
        if cd "{{.TASKFILE_DIR}}/{{.V1ALPHA2_OPM_DIR}}" && cue vet -t test -c \
          ./core/... ./schemas/... ./resources/... ./traits/... ./blueprints/... ./providers/...; then
          echo -e "${GREEN}✔ opmodel.dev/opm@v1 strict — Successful${NC}"
        else
          echo -e "${RED}✗ opmodel.dev/opm@v1 strict — Failed${NC}"
          exit 1
        fi

  # ============================================================================
  # Version Management
  # ============================================================================

  version:
    desc: Show current module version
    preconditions:
      - sh: command -v yq >/dev/null 2>&1
        msg: "yq is required. Install: brew install yq"
    cmds:
      - |
        VERSION=$(yq '.v1alpha1.version' {{.VERSION_FILE}})
        echo "v1alpha1: $VERSION"

  version:bump:
    desc: Bump module version (TYPE=patch/minor/major)
    summary: |
      Bump the version for the v1alpha1 module following SemVer.

      Usage:
        task version:bump              # Bump patch (default)
        task version:bump TYPE=patch   # v1.0.0 -> v1.0.1
        task version:bump TYPE=minor   # v1.0.0 -> v1.1.0
        task version:bump TYPE=major   # v1.0.0 -> v2.0.0
    vars:
      TYPE: '{{.TYPE | default "patch"}}'
    preconditions:
      - sh: command -v yq >/dev/null 2>&1
        msg: "yq is required. Install: brew install yq"
    cmds:
      - |
        CURRENT=$(yq '.v1alpha1.version' {{.VERSION_FILE}} | sed 's/^v//')

        IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

        case "{{.TYPE}}" in
          major)
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
            ;;
          minor)
            MINOR=$((MINOR + 1))
            PATCH=0
            ;;
          patch)
            PATCH=$((PATCH + 1))
            ;;
          *)
            echo "Invalid TYPE: {{.TYPE}}. Use patch, minor, or major."
            exit 1
            ;;
        esac

        NEW="v${MAJOR}.${MINOR}.${PATCH}"
        yq -i '.v1alpha1.version = "'$NEW'"' {{.VERSION_FILE}}
        echo "Bumped v1alpha1: v${CURRENT} -> ${NEW}"

  # ============================================================================
  # Publishing
  # ============================================================================

  publish:local:
    desc: Publish v1alpha1 to local registry
    summary: |
      Publish the v1alpha1 module to the local OCI registry.

      Usage:
        task publish:local              # Use version from versions.yml
        task publish:local VERSION=v1.0.1  # Use explicit version
    vars:
      VERSION: '{{.VERSION | default ""}}'
    preconditions:
      - sh: command -v yq >/dev/null 2>&1
        msg: "yq is required. Install: brew install yq"
    cmds:
      - |
        if [ -z "{{.VERSION}}" ]; then
          VERSION=$(yq '.v1alpha1.version' {{.VERSION_FILE}})
        else
          VERSION="{{.VERSION}}"
        fi

        echo "Publishing v1alpha1@$VERSION to {{.LOCAL_REGISTRY}}..."
        cd "{{.V1ALPHA1_DIR}}" && cue mod publish "$VERSION"
        echo "Published v1alpha1@$VERSION"

  publish:smart:
    desc: Auto-detect changes, bump version, and publish
    deps:
      - fmt
      - vet
    summary: |
      Detect whether the v1alpha1 module has source changes (via checksum comparison),
      bump the version, tidy, and publish.

      Change detection uses SHA-256 checksums of .cue files (excluding cue.mod/)
      stored in versions.yml.

      Usage:
        task publish:smart                    # Detect, bump patch, publish
        task publish:smart DRY_RUN=true       # Preview without executing
        task publish:smart TYPE=minor         # Minor bump instead of patch
    vars:
      DRY_RUN: '{{.DRY_RUN | default "false"}}'
      TYPE: '{{.TYPE | default "patch"}}'
    preconditions:
      - sh: command -v yq >/dev/null 2>&1
        msg: "yq is required. Install: brew install yq"
      - sh: command -v cue >/dev/null 2>&1
        msg: "cue is required. Install: go install cuelang.org/go/cmd/cue@latest"
      - sh: command -v git >/dev/null 2>&1
        msg: "git is required"
    cmds:
      - |
        set -euo pipefail

        MODULE_DIR="{{.V1ALPHA1_DIR}}"
        VERSION_FILE="{{.VERSION_FILE}}"
        DRY_RUN="{{.DRY_RUN}}"
        BUMP_TYPE="{{.TYPE}}"

        # ── Colors ────────────────────────────────────────────────────
        BOLD='\033[1m'
        DIM='\033[2m'
        RED='\033[0;31m'
        GREEN='\033[0;32m'
        YELLOW='\033[0;33m'
        RESET='\033[0m'

        # ── Helper functions ─────────────────────────────────────────

        get_version() {
          yq '.v1alpha1.version' "$VERSION_FILE"
        }

        get_stored_checksum() {
          yq '.v1alpha1.checksum // ""' "$VERSION_FILE"
        }

        compute_checksum() {
          find "$MODULE_DIR" -name '*.cue' -not -path '*/cue.mod/*' | sort | xargs sha256sum | sha256sum | awk '{print $1}'
        }

        bump_version() {
          local ver="$1"
          local type="$2"
          local stripped="${ver#v}"
          IFS='.' read -r major minor patch <<< "$stripped"
          case "$type" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          echo "v${major}.${minor}.${patch}"
        }

        # ── Phase 1: Detect changes ──────────────────────────────────

        echo -e "${BOLD}Phase 1: Detecting changes...${RESET}"

        stored=$(get_stored_checksum)
        current=$(compute_checksum)

        if [ -z "$stored" ]; then
          echo -e "  ${YELLOW}v1alpha1${RESET}: changed (no stored checksum)"
        elif [ "$stored" != "$current" ]; then
          echo -e "  ${YELLOW}v1alpha1${RESET}: changed"
        else
          echo -e "  v1alpha1: unchanged"
          echo ""
          echo -e "${GREEN}No changes detected. Nothing to publish.${RESET}"
          exit 0
        fi

        version=$(get_version)
        new_version=$(bump_version "$version" "$BUMP_TYPE")

        # ── Dry run exit ─────────────────────────────────────────────

        if [ "$DRY_RUN" = "true" ]; then
          echo ""
          echo -e "${BOLD}Dry run — planned actions:${RESET}"
          echo -e "  ${YELLOW}v1alpha1${RESET}: $version -> ${GREEN}$new_version${RESET} (bump + publish)"
          echo ""
          echo -e "${DIM}No changes made (dry run).${RESET}"
          exit 0
        fi

        # ── Phase 2: Bump, tidy, publish, tag ───────────────────────

        echo ""
        echo -e "${BOLD}Phase 2: Publishing...${RESET}"
        echo ""
        echo -e "${BOLD}${GREEN}[v1alpha1]${RESET} $version -> ${GREEN}$new_version${RESET}"

        # 1. Bump version
        yq -i ".v1alpha1.version = \"${new_version}\"" "$VERSION_FILE"

        # 2. Tidy
        echo "  Tidying..."
        (cd "$MODULE_DIR" && cue mod tidy)

        # 3. Publish
        echo "  Publishing v1alpha1@${new_version}..."
        if ! (cd "$MODULE_DIR" && cue mod publish "$new_version"); then
          echo -e "  ${RED}Failed to publish v1alpha1${RESET}"
          exit 1
        fi

        # 4. Tag
        git tag "catalog/v1alpha1/${new_version}"
        echo "  Tagged catalog/v1alpha1/${new_version}"

        # 5. Store checksum
        new_checksum=$(compute_checksum)
        yq -i ".v1alpha1.checksum = \"${new_checksum}\"" "$VERSION_FILE"
        echo -e "  Checksum: ${DIM}${new_checksum:0:12}...${RESET}"

        echo ""
        echo -e "${BOLD}${GREEN}Done.${RESET} Published v1alpha1@${new_version}"

  # ============================================================================
  # Publishing — v1alpha2
  # ============================================================================

  publish:v1alpha2:
    desc: Publish all v1alpha2 modules (opm, gateway_api, cert_manager) using versions from versions.yml
    summary: |
      Publish all three v1alpha2 CUE modules to the local registry at the versions
      recorded in versions.yml. Does NOT detect changes — always publishes.

      Usage:
        task publish:v1alpha2
    preconditions:
      - sh: command -v yq >/dev/null 2>&1
        msg: "yq is required. Install: brew install yq"
      - sh: command -v cue >/dev/null 2>&1
        msg: "cue is required"
    cmds:
      - |
        set -euo pipefail
        BOLD='\033[1m'; GREEN='\033[0;32m'; RED='\033[0;31m'; RESET='\033[0m'

        echo -e "${BOLD}Publishing v1alpha2 modules...${RESET}"

        publish_module() {
          local name="$1"
          local dir="$2"
          local key="$3"
          local version
          version=$(yq ".v1alpha2.${key}.version" "{{.VERSION_FILE}}")
          echo -e "${BOLD}[${name}]${RESET} publishing @ ${version}..."
          cd "${dir}" && cue mod tidy
          cd ../../
          if (cd "{{.TASKFILE_DIR}}/${dir}" && cue mod publish "${version}"); then
            echo -e "  ${GREEN}✔ ${name}@${version}${RESET}"
          else
            echo -e "  ${RED}✗ Failed to publish ${name}${RESET}"
            exit 1
          fi
        }

        publish_module "opmodel.dev/opm@v1"          "{{.V1ALPHA2_OPM_DIR}}"          "opm"
        publish_module "opmodel.dev/gateway_api@v1"  "{{.V1ALPHA2_GATEWAY_DIR}}"      "gateway_api"
        publish_module "opmodel.dev/cert_manager@v1" "{{.V1ALPHA2_CERT_MANAGER_DIR}}"  "cert_manager"

        echo ""
        echo -e "${BOLD}${GREEN}Done.${RESET} All v1alpha2 modules published."

  publish:v1alpha2:smart:
    desc: Detect changes across v1alpha2 modules, bump versions independently, and publish changed modules
    summary: |
      For each v1alpha2 module (opm, gateway_api, cert_manager), computes a SHA-256
      checksum of .cue files (excluding cue.mod/), compares with the stored checksum
      in versions.yml, and publishes only modules that changed.

      Each module is versioned independently. A patch bump is applied by default.

      Usage:
        task publish:v1alpha2:smart                  # Detect, bump patch, publish
        task publish:v1alpha2:smart DRY_RUN=true     # Preview without executing
        task publish:v1alpha2:smart TYPE=minor        # Minor bump instead of patch
    vars:
      DRY_RUN: '{{.DRY_RUN | default "false"}}'
      TYPE: '{{.TYPE | default "patch"}}'
    preconditions:
      - sh: command -v yq >/dev/null 2>&1
        msg: "yq is required. Install: brew install yq"
      - sh: command -v cue >/dev/null 2>&1
        msg: "cue is required"
      - sh: command -v git >/dev/null 2>&1
        msg: "git is required"
    cmds:
      - |
        set -euo pipefail

        VERSION_FILE="{{.VERSION_FILE}}"
        DRY_RUN="{{.DRY_RUN}}"
        BUMP_TYPE="{{.TYPE}}"

        BOLD='\033[1m'; DIM='\033[2m'; RED='\033[0;31m'; GREEN='\033[0;32m'; YELLOW='\033[0;33m'; RESET='\033[0m'

        compute_checksum() {
          local dir="$1"
          find "{{.TASKFILE_DIR}}/${dir}" -name '*.cue' -not -path '*/cue.mod/*' | sort | xargs sha256sum | sha256sum | awk '{print $1}'
        }

        bump_version() {
          local ver="${1#v}"
          IFS='.' read -r major minor patch <<< "$ver"
          case "$2" in
            major) major=$((major+1)); minor=0; patch=0 ;;
            minor) minor=$((minor+1)); patch=0 ;;
            patch) patch=$((patch+1)) ;;
          esac
          echo "v${major}.${minor}.${patch}"
        }

        echo -e "${BOLD}Phase 1: Detecting changes...${RESET}"

        CHANGED_NAMES=(); CHANGED_DIRS=(); CHANGED_KEYS=()
        declare -A NEW_VERSIONS

        # --- opmodel.dev/opm@v1 ---
        _stored=$(yq ".v1alpha2.opm.checksum // \"\"" "$VERSION_FILE")
        _current=$(compute_checksum "{{.V1ALPHA2_OPM_DIR}}")
        _version=$(yq ".v1alpha2.opm.version" "$VERSION_FILE")
        _new_version=$(bump_version "$_version" "$BUMP_TYPE")
        if [ -z "$_stored" ]; then
          echo -e "  ${YELLOW}opmodel.dev/opm@v1${RESET}: changed (no stored checksum) → ${_version} → ${GREEN}${_new_version}${RESET}"
          CHANGED_NAMES+=("opmodel.dev/opm@v1"); CHANGED_DIRS+=("{{.V1ALPHA2_OPM_DIR}}"); CHANGED_KEYS+=("opm")
          NEW_VERSIONS["opm"]="$_new_version"
        elif [ "$_stored" != "$_current" ]; then
          echo -e "  ${YELLOW}opmodel.dev/opm@v1${RESET}: changed → ${_version} → ${GREEN}${_new_version}${RESET}"
          CHANGED_NAMES+=("opmodel.dev/opm@v1"); CHANGED_DIRS+=("{{.V1ALPHA2_OPM_DIR}}"); CHANGED_KEYS+=("opm")
          NEW_VERSIONS["opm"]="$_new_version"
        else
          echo -e "  opmodel.dev/opm@v1: unchanged"
        fi

        # --- opmodel.dev/gateway_api@v1 ---
        _stored=$(yq ".v1alpha2.gateway_api.checksum // \"\"" "$VERSION_FILE")
        _current=$(compute_checksum "{{.V1ALPHA2_GATEWAY_DIR}}")
        _version=$(yq ".v1alpha2.gateway_api.version" "$VERSION_FILE")
        _new_version=$(bump_version "$_version" "$BUMP_TYPE")
        if [ -z "$_stored" ]; then
          echo -e "  ${YELLOW}opmodel.dev/gateway_api@v1${RESET}: changed (no stored checksum) → ${_version} → ${GREEN}${_new_version}${RESET}"
          CHANGED_NAMES+=("opmodel.dev/gateway_api@v1"); CHANGED_DIRS+=("{{.V1ALPHA2_GATEWAY_DIR}}"); CHANGED_KEYS+=("gateway_api")
          NEW_VERSIONS["gateway_api"]="$_new_version"
        elif [ "$_stored" != "$_current" ]; then
          echo -e "  ${YELLOW}opmodel.dev/gateway_api@v1${RESET}: changed → ${_version} → ${GREEN}${_new_version}${RESET}"
          CHANGED_NAMES+=("opmodel.dev/gateway_api@v1"); CHANGED_DIRS+=("{{.V1ALPHA2_GATEWAY_DIR}}"); CHANGED_KEYS+=("gateway_api")
          NEW_VERSIONS["gateway_api"]="$_new_version"
        else
          echo -e "  opmodel.dev/gateway_api@v1: unchanged"
        fi

        # --- opmodel.dev/cert_manager@v1 ---
        _stored=$(yq ".v1alpha2.cert_manager.checksum // \"\"" "$VERSION_FILE")
        _current=$(compute_checksum "{{.V1ALPHA2_CERT_MANAGER_DIR}}")
        _version=$(yq ".v1alpha2.cert_manager.version" "$VERSION_FILE")
        _new_version=$(bump_version "$_version" "$BUMP_TYPE")
        if [ -z "$_stored" ]; then
          echo -e "  ${YELLOW}opmodel.dev/cert_manager@v1${RESET}: changed (no stored checksum) → ${_version} → ${GREEN}${_new_version}${RESET}"
          CHANGED_NAMES+=("opmodel.dev/cert_manager@v1"); CHANGED_DIRS+=("{{.V1ALPHA2_CERT_MANAGER_DIR}}"); CHANGED_KEYS+=("cert_manager")
          NEW_VERSIONS["cert_manager"]="$_new_version"
        elif [ "$_stored" != "$_current" ]; then
          echo -e "  ${YELLOW}opmodel.dev/cert_manager@v1${RESET}: changed → ${_version} → ${GREEN}${_new_version}${RESET}"
          CHANGED_NAMES+=("opmodel.dev/cert_manager@v1"); CHANGED_DIRS+=("{{.V1ALPHA2_CERT_MANAGER_DIR}}"); CHANGED_KEYS+=("cert_manager")
          NEW_VERSIONS["cert_manager"]="$_new_version"
        else
          echo -e "  opmodel.dev/cert_manager@v1: unchanged"
        fi

        if [ ${#CHANGED_NAMES[@]} -eq 0 ]; then
          echo ""
          echo -e "${GREEN}No changes detected. Nothing to publish.${RESET}"
          exit 0
        fi

        if [ "$DRY_RUN" = "true" ]; then
          echo ""
          echo -e "${BOLD}Dry run — no changes made.${RESET}"
          exit 0
        fi

        echo ""
        echo -e "${BOLD}Phase 2: Publishing...${RESET}"

        for i in "${!CHANGED_NAMES[@]}"; do
          name="${CHANGED_NAMES[$i]}"
          dir="${CHANGED_DIRS[$i]}"
          key="${CHANGED_KEYS[$i]}"
          new_version="${NEW_VERSIONS[$key]}"

          echo -e "${BOLD}${GREEN}[${name}]${RESET} → ${GREEN}${new_version}${RESET}"

          yq -i ".v1alpha2.${key}.version = \"${new_version}\"" "$VERSION_FILE"

          echo "  Publishing..."
          if ! (cd "{{.TASKFILE_DIR}}/${dir}" && cue mod publish "${new_version}"); then
            echo -e "  ${RED}Failed to publish ${name}${RESET}"
            exit 1
          fi

          git tag "catalog/v1alpha2/${key}/${new_version}"
          echo "  Tagged catalog/v1alpha2/${key}/${new_version}"

          new_checksum=$(compute_checksum "$dir")
          yq -i ".v1alpha2.${key}.checksum = \"${new_checksum}\"" "$VERSION_FILE"
          echo -e "  Checksum: ${DIM}${new_checksum:0:12}...${RESET}"
        done

        echo ""
        echo -e "${BOLD}${GREEN}Done.${RESET} Published ${#CHANGED_NAMES[@]} v1alpha2 module(s)."
