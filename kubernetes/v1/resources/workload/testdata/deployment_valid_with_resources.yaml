metadata:
  name: my-app-full
  namespace: production
  labels:
    app: my-app-full
    env: production
  annotations:
    prometheus.io/scrape: "true"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: my-app-full
  template:
    metadata:
      labels:
        app: my-app-full
        env: production
    spec:
      containers:
        - name: app
          image: my-registry/my-app:v1.2.3
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: ENV
              value: production
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
